name: Coverage Report
on: [ workflow_dispatch ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      folder_name: ${{ steps.meta.outputs.folder_name }}
      wiki_page: ${{ steps.meta.outputs.wiki_page }}
      wiki_title: ${{ steps.meta.outputs.wiki_title }}
      branch: ${{ steps.meta.outputs.branch }}
      commit: ${{ steps.meta.outputs.commit }}
      timestamp: ${{ steps.meta.outputs.timestamp }}
      java: ${{ steps.meta.outputs.java }}
      mc_version: ${{ steps.meta.outputs.mc_version }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}

      - name: Run all tests with coverage (3 retries)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            ./gradlew runGameTestWithCoverage jacocoTestReport --stacktrace && break
            if [ $i -lt 3 ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            else
              echo "All attempts failed."
              exit 1
            fi
          done

      - name: Extract metadata
        id: meta
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          COMMIT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          DATE_TIME=$(date -u +"%Y.%m.%d-%H%M")
          JAVA=$(java -version 2>&1 | head -n 1)
      
          MC_VERSION_RAW=$(grep '^works_for_version' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          MC_VERSION_PRETTY=$(echo "$MC_VERSION_RAW" | sed 's/-/ - /')
          FOLDER_NAME="${MC_VERSION_RAW}-${DATE_TIME}"
          WIKI_PAGE="JaCoCo-report-Mc-version-${MC_VERSION_RAW}-${DATE_TIME}"
          WIKI_TITLE="JaCoCo report Mc version ${MC_VERSION_PRETTY} [${DATE_TIME}]"
      
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "java=$JAVA" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VERSION_RAW" >> $GITHUB_OUTPUT
          echo "mc_version_pretty=$MC_VERSION_PRETTY" >> $GITHUB_OUTPUT
          echo "folder_name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          echo "wiki_page=$WIKI_PAGE" >> $GITHUB_OUTPUT
          echo "wiki_title=$WIKI_TITLE" >> $GITHUB_OUTPUT

      - name: Upload JaCoCo HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacocoRunGameTestHtml/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download JaCoCo HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: new-report/

      - name: Try to check out gh-pages
        uses: actions/checkout@v4
        id: checkout_pages
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Initialise gh-pages branch if it doesn't exist yet
        run: |
          cd gh-pages
      
          if ! git ls-remote --exit-code origin gh-pages; then
            echo "gh-pages does not exist. Creating it."
      
            rm -rf .git
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan gh-pages
            git rm -rf . || true
      
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
      
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialise gh-pages"
            git push --set-upstream origin gh-pages
      
          else
            echo "gh-pages exists. Checking it out."
      
            git fetch origin gh-pages
            git checkout gh-pages
          fi

      - name: Copy new report into gh-pages
        run: |
          FOLDER="${{ needs.build.outputs.folder_name }}"
          mkdir -p "gh-pages/${FOLDER}"
          cp -r new-report/* "gh-pages/${FOLDER}/"

      - name: Regenerate root index.html from all existing folders
        run: |
          cd gh-pages
      
          FOLDERS=$(find . -mindepth 1 -maxdepth 1 -type d \
            | sed 's|^\./||' \
            | grep -v '^\.git$' \
            | sort -r)
      
          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>JaCoCo Coverage Reports - OfflinePlayersReworked</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
              ul { list-style: none; padding: 0; }
              li { margin: 8px 0; }
              a { text-decoration: none; color: #0366d6; font-size: 1.05em; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>JaCoCo Coverage Reports - OfflinePlayersReworked</h1>
            <ul>
          HTML
      
          for FOLDER in $FOLDERS; do
            echo "    <li><a href=\"${FOLDER}/index.html\">${FOLDER}</a></li>" >> index.html
          done
      
          cat >> index.html <<'HTML'
            </ul>
          </body>
          </html>
          HTML

      - name: Commit and push to gh-pages
        run: |
          FOLDER="${{ needs.build.outputs.folder_name }}"
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${FOLDER}/" index.html
          git commit -m "Coverage report: ${FOLDER}" || echo "Nothing to commit"
          git push origin gh-pages || echo "Nothing to push"

  update-wiki:
    needs: [build, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki

      - name: Create wiki page linking to GitHub Pages report
        run: |
          PAGE="${{ needs.build.outputs.wiki_page }}"
          TITLE="${{ needs.build.outputs.wiki_title }}"
          BRANCH="${{ needs.build.outputs.branch }}"
          COMMIT="${{ needs.build.outputs.commit }}"
          TIMESTAMP="${{ needs.build.outputs.timestamp }}"
          JAVA="${{ needs.build.outputs.java }}"
          MC_VERSION="${{ needs.build.outputs.mc_version }}"
          FOLDER="${{ needs.build.outputs.folder_name }}"

          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${FOLDER}/index.html"

          mkdir -p "wiki/jacoco-reports"

          cd wiki
          git add jacoco-reports
          git commit -m "Ensure jacoco-reports folder exists" || true
          cd ..
          
          cat > "wiki/jacoco-reports/${PAGE}.md" <<EOF
          **Branch:** ${BRANCH}  
          **Commit:** ${COMMIT}  
          **Tested at:** ${TIMESTAMP}  
          **Java:** ${JAVA}  
          **Minecraft:** ${MC_VERSION}
          
          ---
          
          ## Full HTML Report (GitHub Pages)
          
          [Open JaCoCo HTML Report](${REPORT_URL})
          EOF

      - name: Update main wiki page with table of reports
        run: |
          cd wiki
      
          echo "**Available Coverage Reports**" > Home.md
          echo "" >> Home.md
          echo "| Report |" >> Home.md
          echo "|--------|" >> Home.md
      
          for PAGE in $(ls -1 "jacoco-reports"/*.md | sort -r); do
            BASENAME=$(basename "$PAGE" .md)
            URL=$(echo "${BASENAME}" | sed 's/ /%20/g')
            echo "| [${BASENAME}](${URL}) |" >> Home.md
          done

      - name: Commit & push wiki changes
        run: |
          PAGE="${{ needs.build.outputs.wiki_page }}"
      
          cd wiki
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      
          git add jacoco-reports Home.md
      
          git commit -m "Coverage report: ${PAGE}" || echo "Nothing to commit"
          git push || echo "Nothing to push"
